<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — RiffRecords</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/cart.css">
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a class="brand" href="index.html"><span class="disc"></span>RIFFRECORDS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a class="cart-link" href="cart.html"><strong>Cart</strong> <span class="cart-badge" id="cartBadge">0</span></a>
    </div>
  </nav>
</header>

<main class="section">
  <div class="container">
    <div class="section-head"><h2>Your Cart</h2></div>

    <div id="cartEmptyState" class="empty-state" style="display:none;">
      <h2>Your crate is empty.</h2>
      <p>Go dig through the <a href="shop.html" style="color:var(--color-accent)">shop</a>.</p>
    </div>

    <div id="cartTableWrap">
      <table class="cart-table">
        <thead>
          <tr>
            <th>Album</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>
    </div>

    <div id="cartSummary" class="cart-summary">
      <div class="row"><span>Subtotal</span><span id="cartSubtotal">$0.00</span></div>
      <div class="row"><span>Shipping</span><span>Free</span></div>
      <div class="row total"><span>Total</span><span id="cartGrandTotal">$0.00</span></div>
      <a href="checkout.html" class="btn btn-primary btn-block" style="margin-top:16px;">Proceed to Checkout</a>
    </div>
  </div>
</main>

<footer class="site-footer">
  amiko dato finaluri.
</footer>

<script src="js/cart.js"></script>
<script src="js/cart-page.js"></script>
</body>
</html>
